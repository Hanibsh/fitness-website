name: Deploy to GitHub Pages

on:
  push:
    branches: [leon-coaching-site, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Queue deployments rather than cancelling in-progress ones, so the Pages
# backend processes one at a time without "deployment cancelled" pile-ups.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - name: Build
        run: npm run build
        env:
          DEPLOY_TARGET: gh-pages

      # SPA fallback: Pages serves 404.html for unknown paths, which loads the
      # app so client-side routes (e.g. /tools, /log) resolve correctly.
      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
