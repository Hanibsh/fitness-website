<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="description" content="Free fitness calculators — TDEE, one rep max, protein, strength standards — plus a workout log and 1:1 online coaching with Leon." />
    <meta name="theme-color" content="#FAF9F6" />
    <meta property="og:title" content="Leon | 1:1 Coaching & Fitness Tools" />
    <meta property="og:description" content="Free fitness calculators and a workout log, plus 1:1 coaching with Leon." />
    <meta property="og:type" content="website" />
    <title>Leon | 1:1 Coaching & Fitness Tools</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Set the theme before first paint so there's no flash of the wrong mode. -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('leon_theme')
          var dark = stored ? stored === 'dark' : window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches
          document.documentElement.dataset.theme = dark ? 'dark' : 'light'
        } catch (e) { document.documentElement.dataset.theme = 'light' }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
